site_name: iFlot Docs
site_description: Central documentation for the iFlot project

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md

  - Vision: vision/index.md

  - Overview:
      - Product Overview: overview/product-overview.md
      - Problem Statement: overview/problem-statement.md
      - Target Clients: overview/target-clients.md
      - Value Proposition: overview/value-proposition.md
      - Current Status: overview/current-status.md

  - Discovery: discovery/index.md

  - Architecture:
      - Overview: architecture/index.md
      - C4 Model:
          - Overview: analysis/c4/index.md
          - System Context: analysis/c4/system-context.md
          - Container Diagram: analysis/c4/container-diagram.md

  - ADR:
      - Overview: adr/index.md
      - ADR-001 — Product and System Direction: adr/ADR-001-product-and-system-direction.md
      - ADR-002 — API Package Structure and Internal Architecture: adr/ADR-002-API-package-structure-and-internal-architecture.md
      - ADR-003 — Frontend Framework Selection: adr/ADR-003-frontend-framework-selection.md
      - ADR-004 — Infrastructure and Deployment Strategy: adr/ADR-004-infrastructure-and-deployment-strategy.md
      - ADR-005 — Observability Strategy: adr/ADR-005-observability-strategy.md
      - ADR-006 — Observability Stack: adr/ADR-006-observability-stack.md
      - ADR-007 — Context Backend Propagation Observability Layer: adr/ADR-007-context-backend-propagation-observability-layer.md
      - ADR-008 — Frontend Observability Instrumentation: adr/ADR-008-frontend-observability-instrumentation.md

  - Domain: domain/index.md

  - Design:
      - Overview: design/index.md
      - Figma Links: design/figma-links.md

  - Engineering:
      - Overview: engineering/index.md
      - Observability:
          - Overview: engineering/observability/index.md
          - Context Propagation Standard: engineering/observability/context-propagation-standard.md
          - Flow SLO Catalog: engineering/observability/flow-slo-catalog.md
          - Log Schema: engineering/observability/log-schema.md
          - Metric Catalog: engineering/observability/metric-catalog.md

  - Onboarding: onboarding/index.md

  - Analysis:
      - Framework Evaluation: analysis/frontend-framework-evaluation.md
      - Framework Evaluation (Original): analysis/frontend-framework-analysis-v1.md

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true